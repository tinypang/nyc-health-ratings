<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Food Health Ratings</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      z-index: 1000;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.8rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      opacity: 1;
      transition: opacity 0.2s;
    }

    .legend-item.hidden { opacity: 0.35; }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.25);
    }

    .dot-a  { background: #22c55e; }
    .dot-b  { background: #eab308; }
    .dot-c  { background: #ef4444; }
    .dot-p  { background: #a855f7; }
    .dot-z  { background: #f97316; }
    .dot-na { background: #6b7280; }

    #search-wrap {
      position: relative;
      margin-left: auto;
    }

    #search-input {
      background: #0f3460;
      border: 1px solid #1e4d8c;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.8rem;
      padding: 5px 10px 5px 30px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input:focus { border-color: #3b82f6; }
    #search-input::placeholder { color: #64748b; }

    #search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      font-size: 0.85rem;
    }

    #search-results {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      z-index: 2000;
      max-height: 320px;
      overflow-y: auto;
    }

    #search-results.open { display: block; }

    .search-result {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #1e3a5f22;
      transition: background 0.15s;
    }

    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: #0f3460; }

    .result-grade {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.75rem;
      color: #fff;
    }

    .result-info { overflow: hidden; }

    .result-name {
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-meta {
      font-size: 0.7rem;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-results {
      padding: 12px;
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
    }

    #status {
      font-size: 0.75rem;
      color: #94a3b8;
      white-space: nowrap;
    }

    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: #1e293b; }

    .popup-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .popup-grade {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .popup-meta {
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .popup-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: #60a5fa;
      text-decoration: none;
    }

    .popup-link:hover { text-decoration: underline; }

    #locate-btn {
      position: absolute;
      bottom: 24px;
      right: 10px;
      z-index: 1000;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: background 0.15s, border-color 0.15s;
      line-height: 1;
    }

    #locate-btn:hover { background: #0f3460; border-color: #3b82f6; }
    #locate-btn.locating { border-color: #3b82f6; animation: pulse 1s infinite; }
    #locate-btn.error { border-color: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #changes-btn {
      background: #0f3460;
      border: 1px solid #1e4d8c;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.78rem;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }

    #changes-btn:hover { background: #1e4d8c; border-color: #3b82f6; }

    #changes-modal {
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #changes-modal[hidden] { display: none; }

    .modal-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    .modal-header h2 { font-size: 0.95rem; font-weight: 600; }
    .modal-header p  { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .modal-close:hover { background: #334155; color: #e2e8f0; }

    .modal-summary {
      display: flex;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .summary-chip {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .chip-added    { background: #14532d; color: #86efac; }
    .chip-removed  { background: #450a0a; color: #fca5a5; }
    .chip-improved { background: #1e3a5f; color: #93c5fd; }
    .chip-declined { background: #431407; color: #fdba74; }

    .modal-body {
      overflow-y: auto;
      padding: 12px 18px;
      flex: 1;
    }

    .diff-section { margin-bottom: 18px; }

    .diff-section h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .diff-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #1e3a5f22;
      font-size: 0.8rem;
    }

    .diff-item:last-child { border-bottom: none; }

    .diff-grade {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.7rem;
      color: #fff;
    }

    .diff-arrow { color: #64748b; font-size: 0.7rem; flex-shrink: 0; }

    .diff-name { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .diff-meta { font-size: 0.7rem; color: #64748b; flex-shrink: 0; }

    .boro-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.72rem;
      margin-bottom: 4px;
    }

    .boro-table th {
      text-align: right;
      color: #64748b;
      font-weight: 600;
      padding: 3px 6px;
      white-space: nowrap;
    }

    .boro-table th:first-child { text-align: left; }

    .boro-table td {
      text-align: right;
      padding: 4px 6px;
      border-top: 1px solid #1e3a5f33;
      white-space: nowrap;
    }

    .boro-table td:first-child { text-align: left; font-weight: 500; }

    .boro-table tr:last-child td { font-weight: 600; color: #94a3b8; }

    .delta-up   { color: #22c55e; font-size: 0.68rem; }
    .delta-down { color: #ef4444; font-size: 0.68rem; }
  </style>
</head>
<body>

<header>
  <h1>NYC Food Health Ratings</h1>
  <div class="legend">
    <div class="legend-item" data-grade="A"><div class="dot dot-a"></div>A — Excellent</div>
    <div class="legend-item" data-grade="B"><div class="dot dot-b"></div>B — Good</div>
    <div class="legend-item" data-grade="C"><div class="dot dot-c"></div>C — Needs improvement</div>
    <div class="legend-item" data-grade="P"><div class="dot dot-p"></div>P — Pending re-grade</div>
    <div class="legend-item" data-grade="Z"><div class="dot dot-z"></div>Z — Grade pending</div>
    <div class="legend-item" data-grade="N"><div class="dot dot-na"></div>N — Not yet graded</div>
  </div>
  <div id="search-wrap">
    <span id="search-icon">&#9906;</span>
    <input id="search-input" type="text" placeholder="Search restaurants…" autocomplete="off" disabled />
    <div id="search-results"></div>
  </div>
  <button id="changes-btn" hidden>Changes</button>
  <div id="status">Loading…</div>
</header>

<div id="changes-modal" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <h2>Weekly changes</h2>
        <p id="modal-subtitle"></p>
      </div>
      <button class="modal-close" id="modal-close-btn">&#x2715;</button>
    </div>
    <div class="modal-summary" id="modal-summary"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="map"></div>
<button id="locate-btn" title="Centre on my location">◎</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ── Map setup ──────────────────────────────────────────────────────────────
const map = L.map("map", {
  center: [40.7359, -73.9911], // Union Square fallback
  zoom: 14,
  preferCanvas: true,
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// ── Grade colours ──────────────────────────────────────────────────────────
const GRADE_COLOR = {
  A: "#22c55e",
  B: "#eab308",
  C: "#ef4444",
  P: "#a855f7",
  Z: "#f97316",
  N: "#6b7280",
};

function gradeColor(grade) {
  return GRADE_COLOR[grade] || GRADE_COLOR.N;
}

// ── Search index ───────────────────────────────────────────────────────────
const allMarkers = []; // {row, marker, grade}

// ── Marker cluster groups per grade ───────────────────────────────────────
const clusterGroups = {};
const visibleGrades = new Set(["A", "B", "C", "P", "Z", "N"]);

for (const grade of Object.keys(GRADE_COLOR)) {
  const color = gradeColor(grade);
  clusterGroups[grade] = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction(cluster) {
      const count = cluster.getChildCount();
      const size = count < 100 ? 32 : count < 1000 ? 40 : 48;
      return L.divIcon({
        html: `<div style="
          background:${color};
          color:#000;
          width:${size}px;height:${size}px;
          border-radius:50%;
          display:flex;align-items:center;justify-content:center;
          font-weight:700;font-size:${size < 40 ? 11 : 13}px;
          border:2px solid rgba(255,255,255,0.4);
          box-shadow:0 2px 6px rgba(0,0,0,0.5);">${count}</div>`,
        className: "",
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
      });
    },
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
  });
  clusterGroups[grade].addTo(map);
}

// ── Legend toggle ──────────────────────────────────────────────────────────
document.querySelectorAll(".legend-item").forEach((el) => {
  el.addEventListener("click", () => {
    const grade = el.dataset.grade;
    if (visibleGrades.has(grade)) {
      visibleGrades.delete(grade);
      map.removeLayer(clusterGroups[grade]);
      el.classList.add("hidden");
    } else {
      visibleGrades.add(grade);
      map.addLayer(clusterGroups[grade]);
      el.classList.remove("hidden");
    }
  });
});

// ── Data loading ───────────────────────────────────────────────────────────
const API_BASE = "https://data.cityofnewyork.us/resource/43nn-pn8j.json";
const PAGE_SIZE = 50000;
const statusEl = document.getElementById("status");

let diffData = null;

function setStatus(msg) {
  statusEl.textContent = msg;
}

async function fetchPage(offset) {
  const params = new URLSearchParams({
    $limit: PAGE_SIZE,
    $offset: offset,
    $where: "latitude IS NOT NULL AND grade IS NOT NULL",
    $select: "camis,dba,boro,cuisine_description,latitude,longitude,grade,grade_date,inspection_date,score",
    $order: "inspection_date DESC",
  });
  const res = await fetch(`${API_BASE}?${params}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchAllFromAPI() {
  const seen = new Map();
  let offset = 0;
  let totalFetched = 0;
  while (true) {
    setStatus(`Fetching records ${offset + 1}…`);
    const page = await fetchPage(offset);
    if (page.length === 0) break;
    for (const row of page) {
      if (!seen.has(row.camis)) seen.set(row.camis, row);
    }
    totalFetched += page.length;
    setStatus(`Loaded ${totalFetched.toLocaleString()} records…`);
    if (page.length < PAGE_SIZE) break;
    offset += PAGE_SIZE;
  }
  return [...seen.values()];
}

async function fetchAll() {
  try {
    const manifest = await fetch("data/manifest.json").then((r) => {
      if (!r.ok) throw new Error("no manifest");
      return r.json();
    });
    setStatus("Loading cached data…");
    const records = await fetch(`data/${manifest.latest}.json`).then((r) => r.json());
    try {
      diffData = await fetch(`data/diff-${manifest.latest}.json`).then((r) => {
        if (!r.ok) throw new Error();
        return r.json();
      });
    } catch (_) {}
    return records;
  } catch (_) {
    setStatus("No cached data — fetching live…");
    return fetchAllFromAPI();
  }
}

function formatDate(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function buildPopup(row) {
  const grade = row.grade || "N";
  const color = gradeColor(grade);
  const dohmhUrl = `https://a816-health.nyc.gov/ABCEatsRestaurants/#!/Search/${row.camis}`;
  return `
    <div class="popup-name">${row.dba || "Unknown"}</div>
    <div class="popup-grade" style="background:${color};color:${grade === "B" || grade === "N" ? "#000" : "#fff"}">${grade}</div>
    <div class="popup-meta">
      ${row.cuisine_description ? `<b>Cuisine:</b> ${row.cuisine_description}<br>` : ""}
      ${row.boro ? `<b>Borough:</b> ${row.boro}<br>` : ""}
      ${row.score != null ? `<b>Score:</b> ${row.score}<br>` : ""}
      <b>Grade date:</b> ${formatDate(row.grade_date)}<br>
      <b>Last inspection:</b> ${formatDate(row.inspection_date)}
    </div>
    <a class="popup-link" href="${dohmhUrl}" target="_blank" rel="noopener">View violations on DOHMH ↗</a>`;
}

(async () => {
  try {
    const records = await fetchAll();
    setStatus(`Rendering ${records.length.toLocaleString()} restaurants…`);

    const byGrade = {};
    for (const grade of Object.keys(GRADE_COLOR)) byGrade[grade] = [];

    for (const row of records) {
      const lat = parseFloat(row.latitude);
      const lng = parseFloat(row.longitude);
      if (isNaN(lat) || isNaN(lng)) continue;
      const grade = row.grade in GRADE_COLOR ? row.grade : "N";

      const marker = L.circleMarker([lat, lng], {
        radius: 5,
        color: gradeColor(grade),
        fillColor: gradeColor(grade),
        fillOpacity: 0.85,
        weight: 0.8,
        opacity: 0.9,
      });

      marker.bindPopup(buildPopup(row), { maxWidth: 240 });
      clusterGroups[grade].addLayer(marker);
      allMarkers.push({ row, marker, grade });
    }

    const gradeCount = {};
    for (const g of Object.keys(GRADE_COLOR)) {
      gradeCount[g] = clusterGroups[g].getLayers().length;
    }
    const total = Object.values(gradeCount).reduce((a, b) => a + b, 0);
    setStatus(`${total.toLocaleString()} restaurants`);

    // Enable search now that allMarkers is populated
    initSearch();

    if (diffData) initChangesModal(diffData);
    else document.getElementById("changes-btn").hidden = false; // show even without diff file
  } catch (err) {
    console.error(err);
    setStatus(`Error: ${err.message}`);
  }
})();

// ── Changes modal ──────────────────────────────────────────────────────────
function initChangesModal(diff) {
  const btn      = document.getElementById("changes-btn");
  const modal    = document.getElementById("changes-modal");
  const closeBtn = document.getElementById("modal-close-btn");
  const subtitle = document.getElementById("modal-subtitle");
  const summaryEl= document.getElementById("modal-summary");
  const body     = document.getElementById("modal-body");

  const s = diff.summary;
  const totalChanges = s ? (s.improved + s.declined + s.added + s.removed) : 0;
  btn.textContent = totalChanges > 0 ? `Changes (${totalChanges})` : "Borough Stats";
  btn.hidden = false;

  subtitle.textContent = diff.previous ? `${diff.previous} → ${diff.date}` : diff.date;

  summaryEl.innerHTML = s ? `
    <span class="summary-chip chip-improved">↑ ${s.improved} improved</span>
    <span class="summary-chip chip-declined">↓ ${s.declined} declined</span>
    <span class="summary-chip chip-added">+ ${s.added} new</span>
    <span class="summary-chip chip-removed">− ${s.removed} closed</span>` : "";

  // ── Borough breakdown table ──────────────────────────────────────────────
  function renderDelta(delta) {
    if (delta === null || delta === undefined) return "";
    if (delta === 0) return "";
    const cls   = delta > 0 ? "delta-up" : "delta-down";
    const arrow = delta > 0 ? "↑" : "↓";
    const sign  = delta > 0 ? "+" : "";
    return ` <span class="${cls}">${sign}${delta}${arrow}</span>`;
  }

  function renderPct(gdata) {
    return `${gdata.pct}%${renderDelta(gdata.delta)}`;
  }

  const GRADES = ["A", "B", "C", "Z", "P", "N"];
  const bb = diff.boro_breakdown || {};
  const boros = Object.keys(bb);

  let boroTableHtml = "";
  if (boros.length) {
    // Totals row
    const totals = {};
    let grandTotal = 0;
    for (const g of GRADES) {
      totals[g] = { count: 0, pct: 0, delta: null, _sumPct: 0, _n: 0 };
    }
    for (const boro of boros) {
      grandTotal += bb[boro].total;
      for (const g of GRADES) {
        totals[g].count += bb[boro].grades[g].count;
      }
    }
    // Recompute totals pct from counts
    for (const g of GRADES) {
      totals[g].pct = grandTotal ? round1(totals[g].count / grandTotal * 100) : 0;
    }

    const rows = boros.map((boro) => {
      const cells = GRADES.map((g) => `<td>${renderPct(bb[boro].grades[g])}</td>`).join("");
      return `<tr><td>${boro}</td>${cells}<td>${bb[boro].total.toLocaleString()}</td></tr>`;
    }).join("");

    const totalCells = GRADES.map((g) => `<td>${totals[g].pct}%</td>`).join("");

    boroTableHtml = `<div class="diff-section">
      <h3>Borough breakdown</h3>
      <div style="overflow-x:auto">
        <table class="boro-table">
          <thead><tr>
            <th>Borough</th>
            ${GRADES.map((g) => `<th style="color:${gradeColor(g)}">${g}</th>`).join("")}
            <th>Total</th>
          </tr></thead>
          <tbody>
            ${rows}
            <tr><td>All boroughs</td>${totalCells}<td>${grandTotal.toLocaleString()}</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
  }

  // ── Grade change sections ────────────────────────────────────────────────
  function gradeChip(g) {
    return `<span class="diff-grade" style="background:${gradeColor(g)}">${g}</span>`;
  }

  function renderSection(title, items, renderItem) {
    if (!items || !items.length) return "";
    return `<div class="diff-section">
      <h3>${title} (${items.length})</h3>
      ${items.map(renderItem).join("")}
    </div>`;
  }

  body.innerHTML = boroTableHtml +
    renderSection("Grade improvements", diff.improved, (r) => `
      <div class="diff-item">
        ${gradeChip(r.from)}<span class="diff-arrow">→</span>${gradeChip(r.to)}
        <span class="diff-name">${r.dba || "Unknown"}</span>
        <span class="diff-meta">${r.boro || ""}</span>
      </div>`) +
    renderSection("Grade declines", diff.declined, (r) => `
      <div class="diff-item">
        ${gradeChip(r.from)}<span class="diff-arrow">→</span>${gradeChip(r.to)}
        <span class="diff-name">${r.dba || "Unknown"}</span>
        <span class="diff-meta">${r.boro || ""}</span>
      </div>`) +
    renderSection("New restaurants", diff.added, (r) => `
      <div class="diff-item">
        ${gradeChip(r.grade || "N")}
        <span class="diff-name">${r.dba || "Unknown"}</span>
        <span class="diff-meta">${r.boro || ""}</span>
      </div>`) +
    renderSection("Closed / removed", diff.removed, (r) => `
      <div class="diff-item">
        ${gradeChip(r.grade || "N")}
        <span class="diff-name">${r.dba || "Unknown"}</span>
        <span class="diff-meta">${r.boro || ""}</span>
      </div>`);

  function open()  { modal.hidden = false; document.body.style.overflow = "hidden"; }
  function close() { modal.hidden = true;  document.body.style.overflow = ""; }

  btn.addEventListener("click", open);
  closeBtn.addEventListener("click", close);
  modal.addEventListener("click", (e) => { if (e.target === modal) close(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !modal.hidden) close(); });
}

function round1(n) { return Math.round(n * 10) / 10; }

// ── Geolocation ────────────────────────────────────────────────────────────
(function () {
  const btn = document.getElementById("locate-btn");
  if (!navigator.geolocation) { btn.style.display = "none"; return; }

  btn.addEventListener("click", () => {
    btn.classList.add("locating");
    btn.classList.remove("error");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        btn.classList.remove("locating");
        map.setView([pos.coords.latitude, pos.coords.longitude], 18);
      },
      () => {
        btn.classList.remove("locating");
        btn.classList.add("error");
        setTimeout(() => btn.classList.remove("error"), 2000);
      },
      { timeout: 10000 }
    );
  });
})();

// ── Auto-locate on load ────────────────────────────────────────────────────
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    (pos) => map.setView([pos.coords.latitude, pos.coords.longitude], 18),
    () => {}, // silently ignore — already centred on Union Square
    { timeout: 5000, maximumAge: 60000 }
  );
}

// ── Search ─────────────────────────────────────────────────────────────────
function initSearch() {
  const input = document.getElementById("search-input");
  const resultsEl = document.getElementById("search-results");

  input.disabled = false;
  input.placeholder = "Search restaurants…";

  function closeResults() {
    resultsEl.classList.remove("open");
    resultsEl.innerHTML = "";
  }

  function showResults(query) {
    const q = query.trim().toLowerCase();
    if (q.length < 2) { closeResults(); return; }

    const matches = [];
    for (const entry of allMarkers) {
      if (matches.length >= 20) break;
      if ((entry.row.dba || "").toLowerCase().includes(q)) {
        matches.push(entry);
      }
    }

    resultsEl.innerHTML = "";
    if (matches.length === 0) {
      resultsEl.innerHTML = `<div class="no-results">No restaurants found</div>`;
    } else {
      for (const { row, marker, grade } of matches) {
        const color = gradeColor(grade);
        const item = document.createElement("div");
        item.className = "search-result";
        item.innerHTML = `
          <div class="result-grade" style="background:${color}">${grade}</div>
          <div class="result-info">
            <div class="result-name">${row.dba || "Unknown"}</div>
            <div class="result-meta">${[row.cuisine_description, row.boro].filter(Boolean).join(" · ")}</div>
          </div>`;
        item.addEventListener("click", () => {
          closeResults();
          input.value = row.dba || "";
          // Make the grade layer visible if it was hidden
          if (!visibleGrades.has(grade)) {
            visibleGrades.add(grade);
            map.addLayer(clusterGroups[grade]);
            document.querySelector(`.legend-item[data-grade="${grade}"]`)?.classList.remove("hidden");
          }
          clusterGroups[grade].zoomToShowLayer(marker, () => marker.openPopup());
        });
        resultsEl.appendChild(item);
      }
    }
    resultsEl.classList.add("open");
  }

  input.addEventListener("input", () => showResults(input.value));
  input.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeResults(); input.blur(); } });
  document.addEventListener("click", (e) => {
    if (!document.getElementById("search-wrap").contains(e.target)) closeResults();
  });
}
</script>
